server {
    listen 80;

    location / {
        return 200 '{"status":"active","message":"TerraQuest Experiences API Gateway. Por favor, consume los endpoints del contrato de integracion."}';
        add_header Content-Type application/json;
    }

    location = /health {
        return 200 '{"status":"ok","service":"API Gateway - Atracciones Paula Coronel"}';
        add_header Content-Type application/json;
    }

    # catalog: /api/v1/coronel_paula/catalog/X -> /catalog/X
    location ~ ^/api/v1/coronel_paula/catalog/ {
        rewrite ^/api/v1/coronel_paula/catalog/(.*)$ /catalog/$1 break;
        proxy_pass https://atracciones-catalog-api.onrender.com;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host atracciones-catalog-api.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # booking: /api/v1/coronel_paula/booking/X -> /X
    location ~ ^/api/v1/coronel_paula/booking/ {
        rewrite ^/api/v1/coronel_paula/booking/(.*)$ /$1 break;
        proxy_pass https://atracciones-booking-api.onrender.com;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host atracciones-booking-api.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # billing: /api/v1/coronel_paula/billing/X -> /X
    location ~ ^/api/v1/coronel_paula/billing/ {
        rewrite ^/api/v1/coronel_paula/billing/(.*)$ /$1 break;
        proxy_pass https://tracciones-billing-api.onrender.com;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host tracciones-billing-api.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # identify: /api/v1/coronel_paula/X -> /X
    location ~ ^/api/v1/coronel_paula/ {
        rewrite ^/api/v1/coronel_paula/(.*)$ /$1 break;
        proxy_pass https://atracciones-identify-api.onrender.com;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host atracciones-identify-api.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
